# publish-runs.yml — WS-C nightly run-log pipeline
#
# Two operating modes — choose ONE in your repo's workflow settings:
#
# MODE A — Self-hosted runner (RECOMMENDED, no MinIO needed)
#   The runner lives inside the cluster. The workflow runs `cha diagnose --live`
#   directly and pipes output through `cha anonymize`. No intermediate object
#   storage required. Set runs-on to [self-hosted, cluster] (or your runner label).
#
# MODE B — GitHub-hosted runner + MinIO (if self-hosted runner is unavailable)
#   Credentials are read from Vault at runtime via hashicorp/vault-action.
#   Requires ONE GitHub Actions secret: VAULT_TOKEN
#   All MinIO/bucket config lives in Vault at secret/t6-apps/cha/config.
#
# Vault secret layout (both modes use this for the Slack webhook):
#   vault kv put secret/t6-apps/cha/config \
#     minio_endpoint="http://minio.minio.svc.cluster.local:9000" \
#     minio_access_key="..."                                       \
#     minio_secret_key="..."                                       \
#     minio_bucket="cha-runs"
#
# GitHub Actions secrets required:
#   VAULT_TOKEN  — Vault token with read on secret/t6-apps/cha/config
#                  (Only needed for Mode B; Mode A uses the in-cluster SA)
#
# Vault policy for the GH Actions token (create once):
#   path "secret/data/t6-apps/cha/config" {
#     capabilities = ["read"]
#   }
#
# Vault address is baked in (vault.baisoln.com is publicly reachable).

name: publish-runs

on:
  schedule:
    # 02:00 UTC daily — after the in-cluster CronJob has run.
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Date to publish (YYYY-MM-DD). Defaults to yesterday."
        required: false
      mode:
        description: "Override mode: self-hosted or minio"
        required: false
        default: ""

permissions:
  contents: write   # to commit the JSONL and SUMMARY.md

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # MODE A — Self-hosted runner: diagnose live, no MinIO
  # ─────────────────────────────────────────────────────────────────────────
  publish-self-hosted:
    name: "Publish (self-hosted runner — no MinIO)"
    # EDIT: change to your self-hosted runner label, or comment out this job
    # and uncomment the publish-minio job below.
    runs-on: [self-hosted, cluster]
    # Remove the `if` condition below once you have a self-hosted runner:
    if: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build cha
        run: go build -o cha ./cmd/cha

      - name: Resolve target date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(date -u -d 'yesterday' +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Diagnose, anonymize, append JSONL
        run: |
          DATE=${{ steps.date.outputs.date }}
          RUN_ID="run-${DATE}"
          mkdir -p runs
          ./cha diagnose --live --format json \
            | ./cha anonymize --run-id "$RUN_ID" --timestamp "${DATE}T02:00:00Z" \
            >> runs/"$DATE".jsonl
          echo "Appended 1 record to runs/$DATE.jsonl"

      - name: Regenerate SUMMARY.md
        run: ./cha summarize runs/ > runs/SUMMARY.md

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=${{ steps.date.outputs.date }}
          git add runs/"$DATE".jsonl runs/SUMMARY.md
          git diff --cached --quiet || git commit -m "runs: add anonymized run for $DATE"
          git push

  # ─────────────────────────────────────────────────────────────────────────
  # MODE B — GitHub-hosted runner: pull from MinIO, creds from Vault
  # ─────────────────────────────────────────────────────────────────────────
  publish-minio:
    name: "Publish (GitHub-hosted runner + MinIO, creds from Vault)"
    runs-on: ubuntu-latest
    # Set to `true` (or remove this `if`) when using Mode B.
    if: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build cha
        run: go build -o cha ./cmd/cha

      - name: Pull MinIO credentials from Vault
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.baisoln.com
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            secret/data/t6-apps/cha/config minio_endpoint       | MINIO_ENDPOINT ;
            secret/data/t6-apps/cha/config minio_access_key     | MINIO_ACCESS_KEY ;
            secret/data/t6-apps/cha/config minio_secret_key     | MINIO_SECRET_KEY ;
            secret/data/t6-apps/cha/config minio_bucket         | MINIO_BUCKET

      - name: Install MinIO client (mc)
        run: |
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o mc
          chmod +x mc

      - name: Resolve target date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(date -u -d 'yesterday' +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure mc alias
        run: ./mc alias set minio "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"

      - name: Pull run files from MinIO
        run: |
          DATE=${{ steps.date.outputs.date }}
          mkdir -p /tmp/cha-runs/"$DATE"
          ./mc cp --recursive minio/"$MINIO_BUCKET"/runs/"$DATE"/ /tmp/cha-runs/"$DATE"/ || true
          COUNT=$(find /tmp/cha-runs/"$DATE" -name "*.json" | wc -l)
          echo "Downloaded $COUNT run file(s) for $DATE"
          if [ "$COUNT" -eq 0 ]; then
            echo "No run files found for $DATE — skipping."
            echo "skip=true" >> "$GITHUB_ENV"
          fi

      - name: Anonymize and append JSONL
        if: env.skip != 'true'
        run: |
          DATE=${{ steps.date.outputs.date }}
          mkdir -p runs
          for f in /tmp/cha-runs/"$DATE"/*.json; do
            RUN_ID="$(basename "$f" .json)"
            ./cha anonymize --run-id "$RUN_ID" --timestamp "${DATE}T02:00:00Z" "$f" \
              >> runs/"$DATE".jsonl
          done
          echo "Appended $(wc -l < runs/"$DATE".jsonl) record(s) to runs/$DATE.jsonl"

      - name: Regenerate SUMMARY.md
        if: env.skip != 'true'
        run: ./cha summarize runs/ > runs/SUMMARY.md

      - name: Commit and push
        if: env.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=${{ steps.date.outputs.date }}
          git add runs/"$DATE".jsonl runs/SUMMARY.md
          git diff --cached --quiet || git commit -m "runs: add anonymized run for $DATE"
          git push
