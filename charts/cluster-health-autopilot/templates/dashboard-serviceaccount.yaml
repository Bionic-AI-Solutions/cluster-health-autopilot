{{- if ((.Values.dashboard).enabled) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cha.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cha.labels" . | nindent 4 }}
    cha.bionicaisolutions.com/role: dashboard
  annotations:
    cha.bionicaisolutions.com/purpose: >-
      Read-only dashboard ServiceAccount (P6.6). Carries ONLY get/list/watch
      on driftreports — no signing key, no mutate verbs, no Secret access.
{{- end }}
