suite: protectedNamespaces.extra append-only extension (v1.25.2)
templates:
  - templates/watcher-deployment.yaml
  - templates/cronjob-diagnose.yaml
  - templates/cronjob-remediate.yaml
  - templates/aiwatch-deployment.yaml
tests:
  - it: no CHA_PROTECTED_NAMESPACES_EXTRA when extra is empty (default)
    template: templates/watcher-deployment.yaml
    set:
      watcher.enabled: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: CHA_PROTECTED_NAMESPACES_EXTRA
          any: true

  - it: watcher gets CHA_PROTECTED_NAMESPACES_EXTRA when extra is set
    template: templates/watcher-deployment.yaml
    set:
      watcher.enabled: true
      protectedNamespaces.extra:
        - prod-payments
        - tenant-a
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CHA_PROTECTED_NAMESPACES_EXTRA
            value: "prod-payments,tenant-a"

  - it: diagnose cronjob gets CHA_PROTECTED_NAMESPACES_EXTRA when extra is set
    template: templates/cronjob-diagnose.yaml
    set:
      protectedNamespaces.extra:
        - prod-payments
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: CHA_PROTECTED_NAMESPACES_EXTRA
            value: "prod-payments"

  - it: remediate cronjob gets CHA_PROTECTED_NAMESPACES_EXTRA when extra is set
    template: templates/cronjob-remediate.yaml
    set:
      remediation.enabled: true
      protectedNamespaces.extra:
        - prod-payments
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: CHA_PROTECTED_NAMESPACES_EXTRA
            value: "prod-payments"

  - it: aiwatch deployment gets CHA_PROTECTED_NAMESPACES_EXTRA when extra is set
    template: templates/aiwatch-deployment.yaml
    set:
      ai.enabled: true
      ai.endpoint: "https://gpu-ai.example/v1"
      ai.model: "qwen3.6-35b-a3b-fp8"
      protectedNamespaces.extra:
        - prod-payments
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CHA_PROTECTED_NAMESPACES_EXTRA
            value: "prod-payments"
